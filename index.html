<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 바코드 라벨 생성기</title>
    <!-- 바코드 및 PDF 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #475569;
            /* 라벨 크기 변수 */
            --label-width: 100mm;
            --label-height: auto;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 메인 레이아웃 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 에디터 영역 */
        .editor {
            width: 450px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .editor h1 {
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 1.2rem;
            color: var(--primary-color);
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            color: var(--text-main);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .barcode-error {
            color: #ef4444;
            font-size: 0.7rem;
            margin-top: 0.3rem;
            display: none;
            font-weight: 600;
        }

        .btn-pdf {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 1.5rem;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.15);
            transition: all 0.3s ease;
        }

        .btn-pdf:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* 오른쪽 미리보기 영역 */
        .preview {
            flex: 1;
            background: #f1f5f9;
            background-image: 
                radial-gradient(#cbd5e1 1px, transparent 1px),
                radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: auto;
            position: relative;
        }

        .zoom-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            border: 1px solid #e2e8f0;
            z-index: 100;
            pointer-events: none;
        }

        /* [사진 기반 완벽 재현] 세로형 라벨 디자인 */
        .label-container {
            width: var(--label-width);
            height: var(--label-height);
            background: white;
            padding: 2mm 2mm; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1.5mm; 
            color: #000;
            overflow: hidden;
            justify-content: flex-start;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center center;
        }



        /* 브랜드 로고 (최상단 중앙 배치) */
        .label-brand-side {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .label-brand {
            font-family: 'Inter', sans-serif;
            font-size: 14mm; /* 상단 중앙이므로 시원하게 확대 */
            font-weight: 900;
            letter-spacing: -0.5mm;
            white-space: nowrap;
            line-height: 1;
            text-align: center;
        }

        .label-header {
            margin: 0;
        }

        .label-title {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 5.1mm;
            font-weight: 900;
            word-break: keep-all;
            line-height: 1.1;
            letter-spacing: -0.2mm;
        }

        .label-middle {
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .label-info-side {
            width: 100%; /* 정보 영역 100% 활용 */
        }

        /* 줄 단위 정보 스타일 (개행 방지) */
        .label-content {
            font-size: 2.85mm;
            line-height: 1.55;
        }

        .info-line {
            display: block;
            margin-bottom: 1.3mm;
            white-space: nowrap;
        }

        .info-key {
            font-weight: 900;
            margin-right: 2.5mm;
        }

        .info-val {
            font-weight: 500;
        }

        /* 주의사항 영역 */
        .caution-section {
            margin: 0;
        }

        .caution-title {
            font-weight: 900;
            font-size: 3.3mm;
            margin-bottom: 2mm;
            display: block;
        }

        .caution-list {
            list-style: none;
            padding: 0;
        }

        .caution-list li {
            position: relative;
            padding-left: 3.8mm;
            margin-bottom: 0.8mm;
            font-size: 2.8mm;
            line-height: 1.4;
            word-break: keep-all;
        }

        .caution-list li::before {
            content: "·";
            position: absolute;
            left: 0.5mm;
            font-weight: 900;
        }

        /* 하단 바코드 영역 */
        .label-footer {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #barcode {
            max-width: 100%;
            height: auto !important;
            display: block !important;
            margin: 0 auto !important;
            image-rendering: pixelated; /* 바코드 막대 선명도 강제 (안티앨리어싱 방지) */
        }

        .barcode-text {
            font-family: 'Inter', sans-serif;
            font-size: 4mm;
            font-weight: 700;
            margin-top: 0.5mm;
            letter-spacing: 0.5mm;
            text-align: center !important;
            width: 100% !important;
        }

        /* 프린트 스타일 */
        @media print {
            body { background: white; }
            .editor { display: none; }
            .preview { padding: 0; background: none; display: block; }
            .label-container { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 에디터 영역 -->
    <div class="editor shadow-lg">
        <h1><span>🔖</span> 라벨 메이커</h1>
        
        <!-- 라벨 규격 설정 추가 -->
        <div class="form-group" style="background: #f1f5f9; padding: 12px; border-radius: 10px; margin-bottom: 1.5rem; border: 1px solid #e2e8f0;">
            <label style="color: var(--primary-color); font-size: 0.85rem; margin-bottom: 8px;">📏 라벨 규격 설정 (mm)</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="flex: 1;">
                    <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">가로(W)</span>
                    <input type="number" id="inputWidth" value="100" min="10" max="300" oninput="updateLabel()" style="margin-top:2px; padding: 5px 8px;">
                </div>
                <div style="flex: 1;">
                    <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">세로(H)</span>
                    <input type="number" id="inputHeight" value="150" min="10" max="500" oninput="updateLabel()" style="margin-top:2px; padding: 5px 8px;">
                </div>
            </div>
            <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 6px;">
                <div style="display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="checkAutoHeight" style="width: auto; height: auto;" onchange="toggleHeightInput()" checked>
                    <label for="checkAutoHeight" style="margin-bottom: 0; font-size: 0.75rem; font-weight: 600; cursor: pointer; color: #475569;">내용에 맞춰 세로 자동 확장</label>
                </div>
                <div style="display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="checkAutoFontSize" style="width: auto; height: auto;" onchange="updateLabel()" checked>
                    <label for="checkAutoFontSize" style="margin-bottom: 0; font-size: 0.75rem; font-weight: 600; cursor: pointer; color: #2563eb;">라벨 크기에 맞춰 글자 크기 자동 조절</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                <label style="margin-bottom: 0; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="showBrand" checked onchange="updateLabel()" style="width: auto; height: auto;"> 브랜드명 (Logo)
                </label>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">크기(mm)</span>
                    <input type="number" id="fontSizeBrand" value="14" step="0.5" min="2" max="50" oninput="updateLabel()" style="width: 50px; padding: 2px 5px; font-size: 0.7rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                </div>
            </div>
            <input type="text" id="inputBrand" value="cleant" oninput="updateLabel()">
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                <label style="margin-bottom: 0; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="showTitle" checked onchange="updateLabel()" style="width: auto; height: auto;"> 제품명 (Title)
                </label>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">크기(mm)</span>
                    <input type="number" id="fontSizeTitle" value="5.1" step="0.1" min="1" max="20" oninput="updateLabel()" style="width: 50px; padding: 2px 5px; font-size: 0.7rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                </div>
            </div>
            <input type="text" id="inputTitle" value="SEO04 클린트 화장실청소" oninput="updateLabel()">
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                <label style="margin-bottom: 0; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="showInfo" checked onchange="updateLabel()" style="width: auto; height: auto;"> 품질표시사항 (항목:내용 형식)
                </label>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">크기(mm)</span>
                    <input type="number" id="fontSizeInfo" value="2.85" step="0.05" min="1" max="10" oninput="updateLabel()" style="width: 50px; padding: 2px 5px; font-size: 0.7rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                </div>
            </div>
            <textarea id="inputInfo" rows="8" oninput="updateLabel()">[입고상품명]:SEO04 클린트 화장실청소
[구성]:틈새브러쉬 1개
[용도]:청소용품
[재질]:스테인리스 스틸, PP, TPR
[제조국]:중국
[수입 및 판매원]:딜라버
[사용기준]:14세 이상
[소비자상담실]:구매처 문의요망</textarea>
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                <label style="margin-bottom: 0; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="showCaution" checked onchange="updateLabel()" style="width: auto; height: auto;"> 주의사항 (한 줄에 하나씩)
                </label>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">크기(mm)</span>
                    <input type="number" id="fontSizeCaution" value="2.8" step="0.05" min="1" max="10" oninput="updateLabel()" style="width: 50px; padding: 2px 5px; font-size: 0.7rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                </div>
            </div>
            <textarea id="inputCaution" rows="5" oninput="updateLabel()">사용 전 결합부 고정 확인을 권장드립니다.
과도한 힘 사용은 파손 및 바닥 손상 우려가 있습니다.
사용 후 깨끗이 헹궈 건조 보관을 권장합니다.</textarea>
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                <label style="margin-bottom: 0; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="showBarcode" checked onchange="updateLabel()" style="width: auto; height: auto;"> 바코드 (숫자 및 영문 혼합 가능)
                </label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">두께</span>
                        <input type="number" id="barcodeThickness" value="2.0" step="0.1" min="1" max="5" oninput="updateLabel()" style="width: 45px; padding: 2px 5px; font-size: 0.7rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <span style="font-size: 0.65rem; color: #64748b; font-weight: 700;">높이(px)</span>
                        <input type="number" id="barcodeHeight" value="80" step="5" min="20" max="200" oninput="updateLabel()" style="width: 45px; padding: 2px 5px; font-size: 0.7rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                    </div>
                </div>
            </div>
            <input type="text" id="inputBarcode" value="S2025090100401" oninput="updateLabel()">
            <div id="barcodeError" class="barcode-error">⚠ 올바른 형식이 아닙니다.</div>
        </div>

        <button class="btn-pdf" onclick="exportPDF()">
            <span>📄</span> PDF 생성 및 다운로드
        </button>
    </div>

    <!-- 미리보기 영역 -->
    <div class="preview">
        <div class="label-container" id="printableLabel">
            <!-- 브랜드 로고 (최상단 중앙 배치) -->
            <div class="label-brand-side">
                <div class="label-brand" id="labelBrand">cleant</div>
            </div>

            <!-- 상품명 -->
            <div class="label-header">
                <div class="label-title" id="labelTitle">SEO04 클린트 화장실청소</div>
            </div>
            
            <!-- 중앙 정보 리스트 (전체 너비 활용) -->
            <div class="label-middle">
                <div class="label-info-side" id="labelInfoContainer">
                    <!-- JS로 데이터 채움 -->
                </div>
            </div>

            <!-- 하단부: 주의사항 + 바코드 -->
            <div class="label-content">
                <div class="caution-section">
                    <span class="caution-title">[주의사항]</span>
                    <ul class="caution-list" id="labelCautionList">
                        <!-- JS로 데이터 채움 -->
                    </ul>
                </div>
            </div>

            <div class="label-footer">
                <canvas id="barcode" style="max-width: 95%; height: auto !important; image-rendering: pixelated;"></canvas>
                <div class="barcode-text" id="barcodeText">S2025090100401</div>
            </div>
        </div>
        <div class="zoom-badge" id="zoomBadge">100%</div>
    </div>
</div>

<script>
    function toggleHeightInput() {
        const autoHeight = document.getElementById('checkAutoHeight').checked;
        const heightInput = document.getElementById('inputHeight');
        heightInput.disabled = autoHeight;
        updateLabel();
    }

    function updateLabel() {
        // 라벨 규격 설정 반영
        const widthEl = document.getElementById('inputWidth');
        const heightEl = document.getElementById('inputHeight');
        const width = widthEl.value || 100;
        const height = heightEl.value || 150;
        const autoHeight = document.getElementById('checkAutoHeight').checked;
        
        document.documentElement.style.setProperty('--label-width', `${width}mm`);
        if (autoHeight) {
            document.documentElement.style.setProperty('--label-height', 'auto');
        } else {
            document.documentElement.style.setProperty('--label-height', `${height}mm`);
        }

        // 항목별 표시 여부 제어
        document.querySelector('.label-brand-side').style.display = document.getElementById('showBrand').checked ? 'block' : 'none';
        document.querySelector('.label-header').style.display = document.getElementById('showTitle').checked ? 'block' : 'none';
        document.querySelector('.label-middle').style.display = document.getElementById('showInfo').checked ? 'block' : 'none';
        document.querySelector('.caution-section').style.display = document.getElementById('showCaution').checked ? 'block' : 'none';
        document.querySelector('.label-footer').style.display = document.getElementById('showBarcode').checked ? 'block' : 'none';

        // 라벨 크기에 따른 폰트 크기 자동 스케일링
        if (document.getElementById('checkAutoFontSize').checked) {
            const scale = Math.min(width / 100, height / 150);
            
            // 기준값에 비례하여 입력 필드 업데이트
            document.getElementById('fontSizeBrand').value = (14 * scale).toFixed(1);
            document.getElementById('fontSizeTitle').value = (5.1 * scale).toFixed(1);
            document.getElementById('fontSizeInfo').value = (2.85 * scale).toFixed(2);
            document.getElementById('fontSizeCaution').value = (2.8 * scale).toFixed(2);

            // 바코드 두께 자동 조절 추가 (기준 2.2 -> 최소 1.0px 확보하여 인식률 개선)
            const thickness = Math.max(1.0, 2.2 * (width / 100)).toFixed(1);
            document.getElementById('barcodeThickness').value = thickness;
        }

        // 글꼴 크기 설정 읽기
        const fontSizeBrand = document.getElementById('fontSizeBrand').value || 14;
        const fontSizeTitle = document.getElementById('fontSizeTitle').value || 5.1;
        const fontSizeInfo = document.getElementById('fontSizeInfo').value || 2.85;
        const fontSizeCaution = document.getElementById('fontSizeCaution').value || 2.8;

        // 기본 텍스트 및 초기화
        const brandInput = document.getElementById('inputBrand').value;
        const titleInput = document.getElementById('inputTitle').value;
        const infoInput = document.getElementById('inputInfo').value;
        const brandEl = document.getElementById('labelBrand');
        const titleEl = document.getElementById('labelTitle');
        
        brandEl.style.fontSize = `${fontSizeBrand}mm`; 
        brandEl.innerText = brandInput;
        
        titleEl.style.fontSize = `${fontSizeTitle}mm`;
        titleEl.innerText = titleInput;

        // 상세 정보 파싱 및 생성
        const infoContainer = document.getElementById('labelInfoContainer');
        infoContainer.innerHTML = '';
        const infoLines = infoInput.split('\n').filter(line => line.trim());
        
        infoLines.forEach(line => {
            const div = document.createElement('div');
            div.className = 'info-line';
            div.style.fontSize = `${fontSizeInfo}mm`;
            
            if (line.includes(':')) {
                const parts = line.split(':');
                const key = parts[0].trim();
                const val = parts.slice(1).join(':').trim();
                const formattedKey = key.startsWith('[') ? key : `[${key}]`;
                div.innerHTML = `<span class="info-key">${formattedKey}</span><span class="info-val">${val}</span>`;
            } else {
                div.innerHTML = `<span class="info-val">${line.trim()}</span>`;
            }
            infoContainer.appendChild(div);

            // [개행 방지] 너비 초과 시 폰트 크기 자동 축소
            const maxWidth = infoContainer.offsetWidth;
            let currentSize = parseFloat(fontSizeInfo);
            while (div.scrollWidth > maxWidth && currentSize > 1.2) {
                currentSize -= 0.05;
                div.style.fontSize = `${currentSize}mm`;
            }
        });

        // 브랜드 로고 크기 자동 최적화
        const brandSide = brandEl.parentElement;
        const brandMaxWidth = brandSide.offsetWidth;
        let currentBrandSize = parseFloat(fontSizeBrand);
        while (brandEl.offsetWidth > brandMaxWidth && currentBrandSize > 5) {
            currentBrandSize -= 0.5;
            brandEl.style.fontSize = `${currentBrandSize}mm`;
        }

        // 주의사항 리스트
        const cautionText = document.getElementById('inputCaution').value;
        const cautionList = document.getElementById('labelCautionList');
        cautionList.innerHTML = '';
        cautionText.split('\n').filter(line => line.trim()).forEach(line => {
            const li = document.createElement('li');
            li.style.fontSize = `${fontSizeCaution}mm`;
            li.innerText = line.trim();
            cautionList.appendChild(li);
        });

        // 바코드 업데이트 (영문 및 숫자 혼합 허용)
        let barcodeValue = document.getElementById('inputBarcode').value.trim();
        const errorEl = document.getElementById('barcodeError');
        const barcodeTextEl = document.getElementById('barcodeText');
        
        errorEl.style.display = 'none';
        barcodeTextEl.innerText = barcodeValue;

        if (barcodeValue) {
            try {
                const barWidth = document.getElementById('barcodeThickness').value || 2.2;
                const barHeight = document.getElementById('barcodeHeight').value || 80;

                JsBarcode("#barcode", barcodeValue, {
                    format: "CODE128", 
                    width: parseFloat(barWidth), 
                    height: parseFloat(barHeight),
                    displayValue: false,
                    margin: 10, // 인식률을 위해 최소 10px의 내부 쿼이어트 존 확보
                    background: "#ffffff"
                });
            } catch (e) {
                console.error("바코드 생성 실패:", e);
                errorEl.style.display = 'block';
                errorEl.innerText = "⚠ 바코드 생성에 실패했습니다.";
            }
        }

        // 세로 자동 확장 시 실제 높이 계산 및 입력란 업데이트
        if (autoHeight) {
            const labelEl = document.getElementById('printableLabel');
            // px를 mm로 변환 (1px ≈ 0.264583mm)
            const actualHeightMm = Math.ceil(labelEl.offsetHeight * 0.264583);
            if (heightEl.value != actualHeightMm) {
                heightEl.value = actualHeightMm;
            }
        }
    }

    async function exportPDF() {
        const button = document.querySelector('.btn-pdf');
        const originalText = button.innerHTML;
        const element = document.getElementById('printableLabel');

        try {
            button.disabled = true;
            button.innerHTML = '<span>⏳</span> PDF 생성 중...';

            await document.fonts.ready;
            await new Promise(resolve => setTimeout(resolve, 500)); 

            const title = document.getElementById('inputTitle').value || 'label';
            const fileName = `${title}_barcode.pdf`;

            // 설정된 가로/세로 규격 가져오기
            const widthMm = parseFloat(document.getElementById('inputWidth').value) || 100;
            const autoHeight = document.getElementById('checkAutoHeight').checked;
            const heightMm = autoHeight ? (element.offsetHeight * 0.264583) : (parseFloat(document.getElementById('inputHeight').value) || 150);

            const opt = {
                margin: 0,
                filename: fileName,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: {
                    scale: 3,
                    useCORS: true,
                    allowTaint: false,
                    letterRendering: true,
                    logging: false,
                    width: element.offsetWidth,
                    height: element.offsetHeight
                },
                jsPDF: {
                    unit: 'mm',
                    format: [widthMm, heightMm],
                    orientation: widthMm > heightMm ? 'l' : 'p', // 가로/세로 오리엔테이션 자동 전환
                    compress: true
                }
            };

            await html2pdf().set(opt).from(element).save();

        } catch (error) {
            console.error('PDF 생성 중 오류 발생:', error);
            alert('PDF 생성 중 오류가 발생했습니다.');
        } finally {
            button.disabled = false;
            button.innerHTML = originalText;
        }
    }

    // 미리보기 확대/축소 기능
    let currentZoom = 1.0;
    const previewArea = document.querySelector('.preview');
    const zoomBadge = document.getElementById('zoomBadge');
    const labelContainer = document.getElementById('printableLabel');

    previewArea.addEventListener('wheel', function(e) {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            currentZoom = Math.min(Math.max(0.2, currentZoom + delta), 5.0);
            
            labelContainer.style.transform = `scale(${currentZoom})`;
            zoomBadge.innerText = `${Math.round(currentZoom * 100)}%`;
        }
    }, { passive: false });

    window.onload = function() {
        toggleHeightInput();
        updateLabel(); // Ensure label is updated on load
    };
</script>

</body>
</html>
